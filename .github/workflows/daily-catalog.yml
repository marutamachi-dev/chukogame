name: Daily catalog refresh

on:
  schedule:
    # 06:00 JST (UTC+9)
    - cron: "0 21 * * *"
  workflow_dispatch:
    inputs:
      build_master:
        description: Build and commit the verified 300-title game master
        required: false
        type: boolean
        default: false
      game_chunk:
        description: Optional price refresh chunk (0-5), all for a full backfill; blank rotates daily
        required: false
        type: string

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - name: Build verified 300-title master
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_master }}
        run: npm run build:master
        env:
          YAHOO_SHOPPING_APP_ID: ${{ secrets.YAHOO_SHOPPING_APP_ID }}
      - name: Test generated master
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_master }}
        run: node --test test/game-master.test.mjs
      - name: Refresh marketplace source offers
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.build_master }}
        run: npm run refresh:sources
        env:
          RAKUTEN_APPLICATION_ID: ${{ secrets.RAKUTEN_APPLICATION_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          YAHOO_SHOPPING_APP_ID: ${{ secrets.YAHOO_SHOPPING_APP_ID }}
          YAHOO_SHOPPING_AFFILIATE_ID: ${{ secrets.YAHOO_SHOPPING_AFFILIATE_ID }}
          GAME_CHUNK: ${{ inputs.game_chunk }}
      - run: npm run build:catalog
      - run: npm test
      - name: Commit refreshed catalog
        run: |
          if [ "${{ inputs.build_master }}" = "true" ]; then
            git add src/data/game-master.json src/data/generated-catalog.js
            COMMIT_MESSAGE="feat: generate verified 300-title game master"
          else
            git add data/source-offers.json src/data/generated-catalog.js
            COMMIT_MESSAGE="chore: refresh game prices"
          fi
          if git diff --cached --quiet; then
            echo "No catalog changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "$COMMIT_MESSAGE"
          git push
